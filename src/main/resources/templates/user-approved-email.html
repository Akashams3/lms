<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="margin:0;background:#eef2f7;font-family:Arial,Helvetica,sans-serif;">

<div style="max-width:650px;margin:auto;background:white;border-radius:12px;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,0.12);">

    <!-- Header -->
    <div style="background:linear-gradient(90deg,#4CAF50,#2e7d32);padding:30px;text-align:center;color:white;">
        <h1 style="margin:0;font-size:26px;">🎉 Account Approved</h1>
        <p style="margin:5px 0 0 0;">Welcome to LMS</p>
    </div>

    <!-- Content -->
    <div style="padding:35px;text-align:center;">

        <h2 style="color:#333;">
            Congratulations <span th:text="${name}" style="color:#4CAF50;"></span> 🚀
        </h2>

        <p style="font-size:16px;color:#555;">
            Your LMS account has been successfully <b>approved</b>.
            You can now explore courses and start learning.
        </p>

    </div>

    <!-- Image -->
    <div style="text-align:center;padding:0 30px 10px 30px;">
        <img src="https://raw.githubusercontent.com/Akashams3/lms/master/src/main/resources/static/images/lms_welcome_image.png"
             style="width:100%;max-width:550px;border-radius:10px;">
    </div>

    <!-- Button -->
    <div style="text-align:center;padding:30px;">

        <a href="http://localhost:8080"
           style="display:inline-block;background:#4CAF50;color:white;padding:14px 32px;text-decoration:none;border-radius:6px;font-size:16px;font-weight:bold;box-shadow:0 3px 8px rgba(0,0,0,0.2);">
            Start Learning →
        </a>

    </div>

    <!-- Footer -->
    <div style="background:#f4f4f4;text-align:center;padding:18px;font-size:13px;color:#777;">
        © 2026 Learning Management System<br>
        Happy Learning!
    </div>

</div>

</body>
</html>

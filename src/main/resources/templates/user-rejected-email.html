<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="margin:0;background:#eef2f7;font-family:Arial,Helvetica,sans-serif;">

<div style="max-width:650px;margin:auto;background:white;border-radius:12px;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,0.12);">

    <!-- Header -->
    <div style="background:linear-gradient(90deg,#f44336,#c62828);padding:30px;text-align:center;color:white;">
        <h1 style="margin:0;font-size:26px;">Registration Status</h1>
        <p style="margin:5px 0 0 0;">Learning Management System</p>
    </div>

    <!-- Content -->
    <div style="padding:35px;text-align:center;">

        <h2 style="color:#333;">
            Hello <span th:text="${name}" style="color:#f44336;"></span>
        </h2>

        <!-- Status Card -->
        <div style="background:#fdecea;border:2px solid #f44336;border-radius:10px;padding:25px;margin:30px 0;">

            <h2 style="color:#f44336;margin:0;">❌ Registration Rejected</h2>

            <p style="color:#555;font-size:15px;margin-top:10px;">
                Unfortunately your LMS account request has been rejected by the administrator.
            </p>

            <p style="color:#777;font-size:14px;">
                If you think this is an error, please contact the LMS support team.
            </p>

        </div>

    </div>

    <!-- Footer -->
    <div style="background:#f4f4f4;text-align:center;padding:18px;font-size:13px;color:#777;">
        © 2026 Learning Management System
    </div>

</div>

</body>
</html>

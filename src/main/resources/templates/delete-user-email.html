<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="margin:0;background:#eef2f7;font-family:Arial,Helvetica,sans-serif;">

<div style="max-width:650px;margin:auto;background:white;border-radius:12px;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,0.12);">


    <div style="background:linear-gradient(90deg,#ff7043,#d84315);padding:30px;text-align:center;color:white;">
        <h1 style="margin:0;font-size:26px;">Account Status</h1>
        <p style="margin:5px 0 0 0;">Learning Management System</p>
    </div>


    <div style="padding:35px;text-align:center;">


        <h2 style="color:#333;">
            Hello <span th:text="${name}" style="color:#d84315;">User</span>
        </h2>

        <!-- Status Card -->
        <div style="background:#fff3e0;border:2px solid #ff7043;border-radius:10px;padding:25px;margin:30px 0;">

            <h2 style="color:#d84315;margin:0;">🗑️ Account Deleted</h2>

            <p style="color:#555;font-size:15px;margin-top:10px;">
                Your LMS account has been removed by the administrator.
            </p>

            <p style="color:#777;font-size:14px;">
                If you believe this action was taken by mistake, please contact our customer support team.
            </p>

        </div>

    </div>

    <!-- Customer Support -->
    <div style="text-align:center;padding:10px 0 25px 0;">

        <p style="color:#555;font-size:14px;margin-bottom:10px;">
            Contact Customer Support
        </p>

        <a href="mailto:akashmmn03@gmail.com?subject=LMS%20Account%20Support"
           style="text-decoration:none;">

            <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png"
                 alt="Email Support"
                 style="width:45px;height:45px;cursor:pointer;">
        </a>

    </div>

    <!-- Footer -->
    <div style="background:#f4f4f4;text-align:center;padding:18px;font-size:13px;color:#777;">
        © 2026 Learning Management System
    </div>

</div>

</body>
</html>

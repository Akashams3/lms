<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="margin:0; padding:0; background:#eef2f7; font-family:Arial, Helvetica, sans-serif;">

<div style="max-width:650px; margin:auto; background:white; border-radius:10px; overflow:hidden; box-shadow:0 5px 15px rgba(0,0,0,0.1);">

    <!-- Header Banner -->
    <div style="background:linear-gradient(90deg,#1e90ff,#00bcd4); color:white; padding:25px; text-align:center;">
        <h1 style="margin:0; font-size:28px;">📚 LMS</h1>
        <h2 style="margin:5px 0 0 0;">New Course Published!</h2>
    </div>

    <!-- Content -->
    <div style="padding:30px; text-align:center;">

        <p style="font-size:16px; color:#444;">
            Hi <b th:text="${name}" style="color:#1e90ff;"></b>,
        </p>

        <p style="font-size:16px; color:#555;">
            A new course has been published on our platform.
        </p>

        <!-- Course Highlight Box -->
        <div style="background:#ff7a18; background:linear-gradient(90deg,#ff7a18,#ffb347);
                    color:white; padding:18px; border-radius:8px; margin:25px 0;">
            <h2 style="margin:0;">Course Published:</h2>
            <h1 style="margin:5px 0;" th:text="${courseTitle}"></h1>
        </div>

        <p style="color:#666;">
            Start learning now and upgrade your skills.
        </p>

        <!-- CTA Button -->
        <a href="http://localhost:8080"
           style="display:inline-block; margin-top:20px; background:#28a745;
                  color:white; padding:12px 28px; text-decoration:none;
                  border-radius:5px; font-size:16px; font-weight:bold;">
            Enroll Now 🚀
        </a>

    </div>

    <!-- Footer -->
    <div style="background:#f5f5f5; padding:15px; text-align:center; font-size:13px; color:#777;">
        © 2026 LMS Team <br>
        Happy Learning!
    </div>

</div>

</body>
</html>
